<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子布洛赫球面可视化 | Bloch Sphere Visualization</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <div id="scene-container"></div>

        <aside id="control-panel">
            <header class="panel-header">
                <h1>布洛赫球面</h1>
                <p class="subtitle">单量子比特态可视化</p>
            </header>

            <section class="control-section">
                <h2>欧拉角控制</h2>
                <div class="slider-group">
                    <label>
                        <span>θ (极角)</span>
                        <input type="range" id="theta" min="0" max="180" value="90" step="0.5">
                        <span class="value" id="theta-value">90°</span>
                    </label>
                    <label>
                        <span>φ (方位角)</span>
                        <input type="range" id="phi" min="0" max="360" value="0" step="0.5">
                        <span class="value" id="phi-value">0°</span>
                    </label>
                </div>
            </section>

            <section class="control-section">
                <h2>量子门操作</h2>
                <div class="gate-grid">
                    <button class="gate-btn hadamard" data-gate="H">
                        <span class="gate-label">Hadamard</span>
                        <span class="gate-symbol">H</span>
                    </button>
                    <button class="gate-btn pauli-x" data-gate="X">
                        <span class="gate-label">Pauli X</span>
                        <span class="gate-symbol">σₓ</span>
                    </button>
                    <button class="gate-btn pauli-y" data-gate="Y">
                        <span class="gate-label">Pauli Y</span>
                        <span class="gate-symbol">σᵧ</span>
                    </button>
                    <button class="gate-btn pauli-z" data-gate="Z">
                        <span class="gate-label">Pauli Z</span>
                        <span class="gate-symbol">σ_z</span>
                    </button>
                </div>
                <div class="gate-actions">
                    <button id="reset-btn" class="action-btn secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        重置到 |0⟩
                    </button>
                    <button id="animate-btn" class="action-btn primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        播放轨迹
                    </button>
                </div>
            </section>

            <section class="control-section">
                <h2>态矢量信息</h2>
                <div class="state-info">
                    <div class="state-row">
                        <span class="state-label">|ψ⟩</span>
                        <span class="state-value" id="state-vector">|0⟩</span>
                    </div>
                    <div class="state-row">
                        <span class="state-label">α</span>
                        <span class="state-value" id="alpha-value">1.000 + 0.000i</span>
                    </div>
                    <div class="state-row">
                        <span class="state-label">β</span>
                        <span class="state-value" id="beta-value">0.000 + 0.000i</span>
                    </div>
                    <div class="state-row">
                        <span class="state-label">|α|²</span>
                        <span class="state-value" id="prob-zero">1.000</span>
                    </div>
                    <div class="state-row">
                        <span class="state-label">|β|²</span>
                        <span class="state-value" id="prob-one">0.000</span>
                    </div>
                </div>
            </section>

            <section class="control-section">
                <h2>显示选项</h2>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="show-labels" checked>
                        <span>显示坐标轴标签</span>
                    </label>
                    <label>
                        <input type="checkbox" id="show-trail" checked>
                        <span>显示轨迹</span>
                    </label>
                    <label>
                        <input type="checkbox" id="show-phase" checked>
                        <span>相位颜色映射</span>
                    </label>
                </div>
            </section>

            <footer class="panel-footer">
                <span>FPS: <span id="fps-counter">60</span></span>
            </footer>
        </aside>

        <div id="tooltip" class="hidden"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
